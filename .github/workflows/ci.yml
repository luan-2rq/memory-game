name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            libx11-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxi-dev \
            libudev-dev \
            libgl1-mesa-dev \
            libfreetype-dev

      - name: Configure
        run: |
          cmake -S . -B Build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DMEMORYGAME_BUILD_TESTS=ON \
            -DMEMORYGAME_HEADED_E2E=OFF

      - name: Build game and tests
        run: cmake --build Build --config Release

      - name: Run unit + e2e tests (headless)
        env:
          MEMORYGAME_E2E_REPEAT: 3
        run: |
          ctest --test-dir Build --output-on-failure --timeout 120

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: memorygame-test-artifacts
          path: |
            Build/bin/
            Build/Testing/
            Build/Tests/*.cmake
            Build/Tests/*.json
